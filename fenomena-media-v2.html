<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fenomena — Cheat Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root {
  --brand:#240354; --brand2:#2d0468; --brand3:#1a0240;
  --lime:#B2F56A; --cyan:#00AFEC; --pink:#EEB1D7;
  --bg:#F4F2FA; --surface:#FFFFFF; --surface2:#F8F7FC;
  --border:#E8E4F4; --border2:#D4CCF0;
  --txt:#1a0240; --txt2:#4B4468; --txt3:#9590AB;
  --green:#16a34a; --green-bg:#f0fdf4;
  --amber:#d97706; --amber-bg:#fffbeb;
  --purple:#7c3aed; --purple-bg:#f5f3ff; --purple-border:#ddd6fe;
  --sb-bg:#240354; --sb-txt:rgba(255,255,255,0.7); --sb-txt-active:#fff;
  --sb-accent:#B2F56A; --sb-hover:rgba(255,255,255,0.08);
  --sb-active:rgba(178,245,106,0.12); --sb-border:rgba(255,255,255,0.08);
}
body { font-family:'Hanken Grotesk',sans-serif; background:var(--bg); color:var(--txt); display:flex; min-height:100vh; }

/* ── SIDEBAR ── */
/* ── SIDEBAR ── */
.sidebar {
  width:220px;
  min-height:100vh;
  background:var(--sb-bg);
  display:flex;
  flex-direction:column;
  position:fixed;
  left:0;top:0;bottom:0;
  z-index:50;
  border-right:1px solid var(--sb-border);
}
.sb-logo {
  padding:24px 20px 20px;
  border-bottom:1px solid var(--sb-border);
}
.sb-logo svg { width:120px; height:auto; display:block; }
.sb-tagline {
  font-size:9px;font-weight:600;letter-spacing:3px;
  text-transform:uppercase;color:var(--sb-accent);
  opacity:0.7;margin-top:6px;
}
.sb-user {
  padding:16px 20px;
  border-bottom:1px solid var(--sb-border);
  display:flex;align-items:center;gap:10px;
}
.sb-av {
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--cyan),var(--lime));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:var(--brand);
  flex-shrink:0;
}
.sb-uname { font-size:13px;font-weight:700;color:#fff; }
.sb-urole { font-size:10px;color:var(--sb-accent);letter-spacing:1px;text-transform:uppercase;opacity:0.8; }

.sb-section {
  padding:8px 12px 4px;
  font-size:9px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--sb-txt);opacity:0.4;
}
.sb-nav { flex:1; padding:8px 0; overflow-y:auto; }
.ni {
  display:flex;align-items:center;gap:10px;
  padding:9px 20px;
  font-size:13px;font-weight:500;
  color:var(--sb-txt);
  cursor:pointer;transition:all 0.15s;
  border-left:3px solid transparent;
  text-decoration:none;
}
.ni:hover { background:var(--sb-hover);color:var(--sb-txt-active); }
.ni.active {
  background:var(--sb-active);
  color:var(--sb-txt-active);
  border-left-color:var(--sb-accent);
}
.ni-icon { font-size:16px;width:20px;text-align:center;flex-shrink:0; }
.ni-badge {
  margin-left:auto;font-size:10px;font-weight:700;
  background:var(--red);color:#fff;
  padding:1px 6px;border-radius:10px;
}
.sb-month {
  padding:16px 20px;
  border-top:1px solid var(--sb-border);
}
.sb-month-label { font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--sb-txt);opacity:0.5;margin-bottom:6px; }
.month-tabs { display:flex;gap:4px; }
.mtab {
  flex:1;font-family:'Hanken Grotesk',sans-serif;
  font-size:11px;font-weight:700;
  padding:5px;border-radius:6px;border:none;
  background:rgba(255,255,255,0.06);
  color:var(--sb-txt);cursor:pointer;transition:all 0.15s;
}
.mtab.active { background:var(--sb-accent);color:var(--brand); }
.sb-bottom {
  padding:16px 20px;
  border-top:1px solid var(--sb-border);
}
.sb-logout {
  width:100%;font-family:'Hanken Grotesk',sans-serif;
  font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  padding:8px;border-radius:7px;
  background:rgba(255,255,255,0.06);border:1px solid var(--sb-border);
  color:var(--sb-txt);cursor:pointer;transition:all 0.15s;
}
.sb-logout:hover { background:rgba(255,255,255,0.1);color:#fff; }


.sb-logout {
  margin:12px 16px 16px;
  padding:8px;
  border-radius:8px;
  border:1px solid var(--sb-border);
  background:none;
  color:var(--sb-txt);
  font-family:inherit;font-size:11px;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.sb-logout:hover { background:rgba(255,255,255,0.1);color:#fff; }

main { flex:1; margin-left:220px; padding:26px 30px; max-width:1500px; }
.page-head { display:flex; align-items:flex-end; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-bottom:18px; }
h1 { font-size:22px; font-weight:800; letter-spacing:-0.3px; }
.subtitle { font-size:12px; color:var(--txt3); margin-top:3px; }
.head-actions { display:flex; gap:8px; align-items:center; }
.search { padding:9px 14px; border-radius:10px; border:1.5px solid var(--border); background:var(--surface); font-family:inherit; font-size:12.5px; width:230px; outline:none; transition:border-color .15s; }
.search:focus { border-color:var(--purple); }

/* filtros por planner */
.fbar { display:flex; gap:6px; margin-bottom:18px; flex-wrap:wrap; }
.fb { padding:6px 13px; border-radius:20px; border:1.5px solid var(--border); background:var(--surface); font-family:inherit; font-size:11.5px; font-weight:600; color:var(--txt2); cursor:pointer; transition:all .15s; }
.fb:hover { border-color:var(--border2); }
.fb.active { background:var(--brand); border-color:var(--brand); color:var(--lime); }

/* ── GRID DE CARDS ── */
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
.card {
  background:var(--surface); border:1px solid var(--border); border-radius:16px;
  overflow:hidden; transition:transform .18s, box-shadow .18s;
  animation: fadeUp .3s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
.card:hover { transform:translateY(-3px); box-shadow:0 12px 32px rgba(36,3,84,0.12); }
.card-head {
  background:linear-gradient(120deg, var(--brand) 0%, var(--brand2) 100%);
  padding:14px 16px 12px; position:relative;
}
.card-head::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--lime), var(--cyan), var(--pink));
}
.card-title { color:#fff; font-weight:800; font-size:15px; letter-spacing:-0.2px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
.card-country { color:rgba(255,255,255,0.55); font-size:10.5px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; margin-top:2px; }
.cm-badge {
  font-size:9px; font-weight:800; letter-spacing:0.05em; padding:3px 8px; border-radius:10px;
  background:var(--lime); color:var(--brand); cursor:pointer; white-space:nowrap; user-select:none;
  transition:opacity .15s;
}
.cm-badge.off { background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.5); }
.cm-badge:hover { opacity:0.85; }

.card-body { padding:14px 16px; }
.role-row { display:flex; align-items:center; gap:8px; padding:5px 0; font-size:12.5px; }
.role-lbl { font-size:9.5px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; color:var(--txt3); width:62px; min-width:62px; }
.role-val { flex:1; font-weight:600; color:var(--txt); border-radius:6px; padding:3px 6px; cursor:text; transition:background .15s; border:1.5px solid transparent; }
.role-val:hover { background:var(--surface2); }
.role-val:focus { outline:none; background:var(--purple-bg); border-color:var(--purple-border); }
.role-val.empty { color:var(--txt3); font-weight:400; font-style:italic; }
.role-dot { width:8px; height:8px; min-width:8px; border-radius:50%; }

.redes-row { display:flex; gap:5px; flex-wrap:wrap; padding:8px 0 4px; border-top:1px dashed var(--border); margin-top:8px; }
.red-chip {
  font-size:10px; font-weight:700; padding:3px 9px; border-radius:12px; cursor:pointer;
  border:1.5px solid var(--border); color:var(--txt3); background:var(--surface); user-select:none;
  transition:all .12s;
}
.red-chip.on { background:var(--brand); border-color:var(--brand); color:var(--lime); }
.red-chip:hover { border-color:var(--border2); }

.links-row { display:flex; gap:7px; margin-top:10px; }
.link-btn {
  flex:1; display:flex; align-items:center; justify-content:center; gap:5px;
  padding:8px; border-radius:9px; font-size:11px; font-weight:700; text-decoration:none;
  border:1.5px solid var(--border); color:var(--txt2); background:var(--surface2);
  cursor:pointer; transition:all .15s; font-family:inherit;
}
.link-btn:hover { border-color:var(--brand); color:var(--brand); }
.link-btn.has { background:var(--brand); border-color:var(--brand); color:#fff; }
.link-btn.has:hover { background:var(--brand2); }

.toast {
  position:fixed; bottom:22px; right:22px; background:var(--brand); color:var(--lime);
  padding:11px 18px; border-radius:10px; font-size:12.5px; font-weight:700;
  box-shadow:0 10px 30px rgba(36,3,84,0.35); opacity:0; transform:translateY(8px);
  transition:all .25s; pointer-events:none; z-index:200;
}
.toast.show { opacity:1; transform:none; }

/* modal para links */
.overlay { position:fixed; inset:0; background:rgba(26,2,64,0.5); backdrop-filter:blur(3px); display:none; align-items:center; justify-content:center; z-index:100; }
.overlay.open { display:flex; }
.modal { background:var(--surface); border-radius:16px; padding:22px; width:min(440px, 92vw); box-shadow:0 24px 60px rgba(26,2,64,0.3); }
.m-title { font-size:15px; font-weight:800; margin-bottom:14px; }
.ml { display:block; font-size:10px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; color:var(--txt3); margin:10px 0 4px; }
.mi { width:100%; padding:9px 12px; border-radius:9px; border:1.5px solid var(--border); font-family:inherit; font-size:12.5px; outline:none; }
.mi:focus { border-color:var(--purple); }
.m-acts { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
.btn { padding:9px 16px; border-radius:9px; font-family:inherit; font-size:12.5px; font-weight:700; cursor:pointer; border:1.5px solid transparent; }
.b-ghost { background:none; border-color:var(--border); color:var(--txt2); }
.b-brand { background:var(--brand); color:var(--lime); }
.b-brand:hover { background:var(--brand2); }
</style>
</head>

const { createClient } = supabase;
const sb = createClient(SB_URL, SB_ANON);

const REDES_OPCIONES = ['Instagram','Facebook','TikTok','YouTube','LinkedIn','X'];
const PLANNER_COLORS = { 'Ian':'#00AFEC', 'Shelsea':'#EEB1D7', 'Megan':'#B2F56A' };
let cuentas = [];
let activeFilter = 'all';

// ── AUTH ──
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session?.user) { window.location.href = 'index.html'; return; }
  const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
  if (profile) {
    const name = profile.nombre || session.user.email?.split('@')[0] || 'Usuario';
    document.getElementById('sb-av').textContent = name.charAt(0).toUpperCase();
    document.getElementById('sb-uname').textContent = name;
    document.getElementById('sb-urole').textContent = profile.rol || 'Planning';
  }
  await loadCuentas();
})();

function doLogout() { sb.auth.signOut().then(() => window.location.href = 'index.html'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── FALLBACK: extraer roles de notas si las columnas están vacías ──
function fromNotas(notas, key) {
  if (!notas) return '';
  const m = notas.match(new RegExp(key + ': ([^.]+)\\.'));
  return m ? m[1].trim() : '';
}

// ── LOAD ──
async function loadCuentas() {
  try {
    const { data, error } = await sb.from('clientes').select('*').eq('activo', true).order('planning_responsable').order('nombre');
    if (error) throw error;
    cuentas = data || [];
    renderCards();
  } catch(e) {
    console.warn('loadCuentas:', e.message);
    document.getElementById('cs-grid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--txt3);">Error al cargar. Revisa la migración 5.</div>';
  }
}

// ── RENDER ──
function buildCard(cl, i) {
  const planner = cl.planning_responsable || '';
  const design = cl.diseñador_asignado || fromNotas(cl.notas, 'Diseño');
  const pauta = cl.pauta_responsable || fromNotas(cl.notas, 'Pauta');
  const redesActivas = (cl.redes || '').split(',').map(r => r.trim()).filter(Boolean);
  const cm = cl.cm_involucrado === true;
  const idSafe = cl.id;

  const redesChips = REDES_OPCIONES.map(r =>
    `<span class="red-chip ${redesActivas.includes(r) ? 'on' : ''}" onclick="toggleRed('${idSafe}','${r}')">${r}</span>`
  ).join('');

  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.planner = planner;
  card.dataset.cm = cm ? '1' : '0';
  card.dataset.search = `${cl.nombre} ${planner} ${design} ${pauta} ${cl.redes||''} ${cl.pais||''}`.toLowerCase();
  card.style.animationDelay = (i * 0.03) + 's';
  card.innerHTML = `
    <div class="card-head">
      <div class="card-title">
        <span>${cl.nombre}</span>
        <span class="cm-badge ${cm ? '' : 'off'}" onclick="toggleCM('${idSafe}')" title="Jaime (CM) ${cm ? 'está' : 'no está'} en esta cuenta">
          ${cm ? '✓ JAIME CM' : '+ JAIME'}
        </span>
      </div>
      <div class="card-country">${cl.pais || 'Panamá'}</div>
    </div>
    <div class="card-body">
      <div class="role-row">
        <span class="role-lbl">Planning</span>
        <span class="role-dot" style="background:${PLANNER_COLORS[planner] || '#9590AB'}"></span>
        <span class="role-val ${planner ? '' : 'empty'}" contenteditable
          onblur="saveRole('${idSafe}','planning_responsable',this)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">${planner || 'Sin asignar'}</span>
      </div>
      <div class="role-row">
        <span class="role-lbl">Diseño</span>
        <span class="role-dot" style="background:var(--purple)"></span>
        <span class="role-val ${design ? '' : 'empty'}" contenteditable
          onblur="saveRole('${idSafe}','diseñador_asignado',this)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">${design || 'Sin asignar'}</span>
      </div>
      <div class="role-row">
        <span class="role-lbl">Pauta</span>
        <span class="role-dot" style="background:var(--cyan)"></span>
        <span class="role-val ${pauta ? '' : 'empty'}" contenteditable
          onblur="saveRole('${idSafe}','pauta_responsable',this)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">${pauta || 'Sin pauta'}</span>
      </div>
      <div class="role-row">
        <span class="role-lbl">Piezas/mes</span>
        <span class="role-dot" style="background:var(--lime)"></span>
        <span class="role-val ${cl.piezas_mes ? '' : 'empty'}" contenteditable
          title="Volumen mensual de piezas — alimenta la carga de diseñadores"
          onblur="savePiezasMes('${idSafe}',this)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">${cl.piezas_mes || '8 (default)'}</span>
      </div>
      <div class="redes-row">${redesChips}</div>
      <div class="links-row">
        ${cl.link_monday
          ? `<a class="link-btn has" href="${cl.link_monday}" target="_blank">📅 Monday</a>`
          : `<button class="link-btn" onclick="openLinks('${idSafe}')">📅 + Monday</button>`}
        ${cl.link_basecamp
          ? `<a class="link-btn has" href="${cl.link_basecamp}" target="_blank">🏕️ Basecamp</a>`
          : `<button class="link-btn" onclick="openLinks('${idSafe}')">🏕️ + Basecamp</button>`}
        <button class="link-btn" onclick="openLinks('${idSafe}')" title="Editar links" style="flex:0 0 38px;">✏️</button>
      </div>
    </div>`;
  return card;
}

function renderCards() {
  const grid = document.getElementById('cs-grid');
  grid.innerHTML = '';
  cuentas.forEach((cl, i) => grid.appendChild(buildCard(cl, i)));
  filterCards();
}

function updateCard(clienteId) {
  const cl = cuentas.find(c => c.id === clienteId);
  const grid = document.getElementById('cs-grid');
  const cards = [...grid.children];
  const idx = cuentas.indexOf(cl);
  if (cl && cards[idx]) {
    const fresh = buildCard(cl, 0);
    fresh.style.animationDelay = '0s';
    cards[idx].replaceWith(fresh);
    filterCards();
  }
}

// ── FILTROS ──
function setFilter(btn, f) {
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = f;
  filterCards();
}

function filterCards() {
  const q = (document.getElementById('cs-search').value || '').toLowerCase();
  document.querySelectorAll('#cs-grid .card').forEach(c => {
    let show = true;
    if (activeFilter === 'jaime') show = c.dataset.cm === '1';
    else if (activeFilter !== 'all') show = c.dataset.planner === activeFilter;
    if (show && q) show = c.dataset.search.includes(q);
    c.style.display = show ? '' : 'none';
  });
}

// ── EDICIONES ──
async function saveRole(clienteId, field, el) {
  const val = el.textContent.trim();
  const clean = (val === 'Sin asignar' || val === 'Sin pauta') ? null : val || null;
  const cl = cuentas.find(c => c.id === clienteId);
  if (!cl) return;
  if ((cl[field] || null) === clean) return; // sin cambios
  try {
    const { error } = await sb.from('clientes').update({ [field]: clean }).eq('id', clienteId);
    if (error) throw error;
    cl[field] = clean;
    showToast('✓ Responsable actualizado');
    updateCard(clienteId);
  } catch(e) { console.warn('saveRole:', e.message); showToast('Error al guardar'); }
}

async function savePiezasMes(clienteId, el) {
  const cl = cuentas.find(c => c.id === clienteId);
  if (!cl) return;
  const num = parseInt(el.textContent) || null;
  if ((cl.piezas_mes || null) === num) { updateCard(clienteId); return; }
  try {
    const { error } = await sb.from('clientes').update({ piezas_mes: num }).eq('id', clienteId);
    if (error) throw error;
    cl.piezas_mes = num;
    showToast('✓ Piezas/mes actualizado — la carga de diseñadores lo usa');
    updateCard(clienteId);
  } catch(e) { console.warn('savePiezasMes:', e.message); showToast('Error: ' + e.message); }
}

async function toggleRed(clienteId, red) {
  const cl = cuentas.find(c => c.id === clienteId);
  if (!cl) return;
  let redes = (cl.redes || '').split(',').map(r => r.trim()).filter(Boolean);
  redes = redes.includes(red) ? redes.filter(r => r !== red) : [...redes, red];
  const nuevo = redes.join(', ') || null;
  try {
    const { error } = await sb.from('clientes').update({ redes: nuevo }).eq('id', clienteId);
    if (error) throw error;
    cl.redes = nuevo;
    updateCard(clienteId);
  } catch(e) { console.warn('toggleRed:', e.message); }
}

async function toggleCM(clienteId) {
  const cl = cuentas.find(c => c.id === clienteId);
  if (!cl) return;
  const nuevo = !(cl.cm_involucrado === true);
  try {
    const { error } = await sb.from('clientes').update({ cm_involucrado: nuevo }).eq('id', clienteId);
    if (error) throw error;
    cl.cm_involucrado = nuevo;
    updateCard(clienteId);
    showToast(nuevo ? '✓ Jaime agregado a la cuenta' : '✓ Jaime removido de la cuenta');
  } catch(e) { console.warn('toggleCM:', e.message); }
}

function openLinks(clienteId) {
  const cl = cuentas.find(c => c.id === clienteId);
  if (!cl) return;
  linksClientId = clienteId;
  document.getElementById('ml-title').textContent = `🔗 Links de ${cl.nombre}`;
  document.getElementById('ml-monday').value = cl.link_monday || '';
  document.getElementById('ml-basecamp').value = cl.link_basecamp || '';
  document.getElementById('modal-links').classList.add('open');
}

async function saveLinks() {
  const cl = cuentas.find(c => c.id === linksClientId);
  if (!cl) return;
  const monday = document.getElementById('ml-monday').value.trim() || null;
  const basecamp = document.getElementById('ml-basecamp').value.trim() || null;
  try {
    const { error } = await sb.from('clientes').update({ link_monday: monday, link_basecamp: basecamp }).eq('id', linksClientId);
    if (error) throw error;
    cl.link_monday = monday; cl.link_basecamp = basecamp;
    document.getElementById('modal-links').classList.remove('open');
    updateCard(linksClientId);
    showToast('✓ Links guardados');
  } catch(e) { console.warn('saveLinks:', e.message); showToast('Error al guardar'); }
}
</script>
</body>
</html>
