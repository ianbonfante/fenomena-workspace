<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fenomena — Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --feno-purple:#240354; --feno-purple3:#1a0240;
  --feno-pink:#EEB1D7; --feno-cyan:#00AFEC;
  --feno-lime:#B2F56A; --feno-white:#FFFFFF;
  --surface:#1a0240; --surface2:#240354;
  --border:rgba(238,177,215,0.15); --border2:rgba(238,177,215,0.3);
  --text:#f5f0ff; --muted:rgba(238,177,215,0.5);
  --red:#ff6b8a; --red-s:rgba(255,107,138,0.1);
  --green-s:rgba(178,245,106,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--feno-purple3);
  color:var(--text);
  font-family:'Hanken Grotesk',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

/* background decoration */
body::before{
  content:'';position:fixed;top:-20%;left:-10%;
  width:60%;height:60%;
  background:radial-gradient(ellipse,rgba(238,177,215,0.06) 0%,transparent 70%);
  pointer-events:none;
}
body::after{
  content:'';position:fixed;bottom:-20%;right:-10%;
  width:50%;height:50%;
  background:radial-gradient(ellipse,rgba(0,175,236,0.07) 0%,transparent 70%);
  pointer-events:none;
}

/* big logo bg */
.bg-logo{
  position:fixed;
  font-family:'Hanken Grotesk',sans-serif;
  font-weight:900;
  font-size:22vw;
  color:rgba(238,177,215,0.03);
  letter-spacing:-2vw;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  white-space:nowrap;
  pointer-events:none;
  user-select:none;
}

/* CARD */
.login-card{
  position:relative;
  z-index:10;
  width:400px;
  max-width:92vw;
  animation:cardIn 0.5s ease;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(20px) scale(0.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* logo */
.logo-wrap{text-align:center;margin-bottom:36px;}
.logo-svg-main{
  width:260px;max-width:80vw;
  display:block;margin:0 auto;
}
.logo-svg-top{
  height:20px;
  display:block;
}
.tagline{
  font-size:10px;font-weight:600;letter-spacing:4px;
  text-transform:uppercase;color:var(--feno-pink);
  opacity:0.75;margin-top:12px;font-style:italic;
}

/* form card */
.form-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:32px;
  box-shadow:0 24px 80px rgba(0,0,0,0.4);
}

.form-title{
  font-size:20px;font-weight:800;
  letter-spacing:-0.5px;margin-bottom:4px;
}
.form-sub{font-size:12px;color:var(--muted);margin-bottom:24px;}

/* fields */
.field{margin-bottom:16px;}
.field label{
  display:block;font-size:8px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;
}
.field input{
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:9px;
  padding:12px 14px;
  font-family:'Hanken Grotesk',sans-serif;
  font-size:13px;color:var(--text);
  outline:none;transition:border-color 0.15s;
}
.field input:focus{border-color:var(--feno-cyan);}
.field input::placeholder{color:var(--muted);}

/* submit */
.submit-btn{
  width:100%;
  background:var(--feno-cyan);
  color:var(--feno-purple);
  border:none;
  border-radius:9px;
  padding:13px;
  font-family:'Hanken Grotesk',sans-serif;
  font-size:12px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;
  transition:all 0.15s;
  margin-top:8px;
}
.submit-btn:hover{background:#33c4f5;transform:translateY(-1px);}
.submit-btn:active{transform:translateY(0);}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

/* error / success */
.msg{
  padding:10px 14px;
  border-radius:8px;
  font-size:12px;
  font-weight:600;
  margin-bottom:14px;
  display:none;
}
.msg.error{background:var(--red-s);border:1px solid rgba(255,107,138,0.25);color:var(--red);}
.msg.success{background:var(--green-s);border:1px solid rgba(178,245,106,0.25);color:var(--feno-lime);}
.msg.show{display:block;}

/* divider */
.or-divider{
  display:flex;align-items:center;gap:10px;
  margin:20px 0;font-size:10px;color:var(--muted);
  letter-spacing:1px;text-transform:uppercase;
}
.or-divider::before,.or-divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}

/* magic link note */
.magic-note{
  text-align:center;font-size:11px;color:var(--muted);
  line-height:1.6;margin-top:20px;
}
.magic-note a{color:var(--feno-cyan);cursor:pointer;text-decoration:none;}
.magic-note a:hover{text-decoration:underline;}

/* loading spinner */
.spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(36,3,84,0.3);
  border-top-color:var(--feno-purple);
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  margin-right:6px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* DASHBOARD (shown after login) */
.dashboard{display:none;position:fixed;inset:0;z-index:20;overflow:hidden;}

/* role cards */
.role-select{
  position:relative;z-index:10;
  width:500px;max-width:92vw;
  animation:cardIn 0.4s ease;
}
.role-title{
  font-size:22px;font-weight:800;
  letter-spacing:-0.5px;margin-bottom:6px;
}
.role-sub{font-size:12px;color:var(--muted);margin-bottom:24px;}
.role-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.role-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;padding:20px;
  cursor:pointer;transition:all 0.15s;
  text-align:center;
}
.role-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.role-card .rc-icon{font-size:28px;margin-bottom:8px;}
.role-card .rc-name{font-size:13px;font-weight:800;margin-bottom:3px;}
.role-card .rc-desc{font-size:10px;color:var(--muted);}

.user-bar{
  position:fixed;top:0;right:0;left:0;
  background:rgba(26,2,64,0.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:12px 28px;
  display:flex;align-items:center;justify-content:space-between;
  z-index:100;
}
.ub-left{display:flex;align-items:center;gap:12px;}
.ub-avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--feno-pink),var(--feno-cyan));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:var(--feno-purple);
}
.ub-name{font-size:13px;font-weight:700;}
.ub-role{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--feno-cyan);margin-top:1px;}
.ub-right{display:flex;align-items:center;gap:10px;}
.logout-btn{
  font-family:'Hanken Grotesk',sans-serif;
  font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:5px 12px;border-radius:7px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);cursor:pointer;transition:all 0.15s;
}
.logout-btn:hover{color:var(--red);border-color:rgba(255,107,138,0.3);}

.dash-content{
  margin-top:57px;
  display:flex;align-items:center;justify-content:center;
  min-height:calc(100vh - 57px);
  padding:32px;
}

.conn-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:4px 10px;border-radius:20px;
  background:var(--green-s);color:var(--feno-lime);
  border:1px solid rgba(178,245,106,0.25);
}
.conn-dot{width:5px;height:5px;border-radius:50%;background:var(--feno-lime);animation:blink 1.5s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>

        <div class="ub-name" id="dash-nombre">Cargando...</div>
        <div class="ub-role" id="dash-rol">—</div>

      <div class="ub-avatar" id="dash-avatar">?</div>
      <button class="logout-btn" onclick="logout()">Cerrar sesión</button>

    <div class="role-select">
      <div class="role-title">¿A dónde vas hoy, <span id="dash-nombre2">—</span>?</div>
      <div class="role-sub">Selecciona el módulo que quieres abrir</div>
      <div class="role-cards" id="role-cards">
        <!-- populated by JS based on role -->
      </div>
    </div>
  </div>
</div>

<script>
// ── SUPABASE CLIENT ──────────────────────────────────────────
const SUPABASE_URL  = 'https://mzzqbgydhiglubucdwjb.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16enFiZ3lkaGlnbHVidWNkd2piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMTIwOTQsImV4cCI6MjA5MzU4ODA5NH0.ZDYHSnhhpBDAQ3Tcpn9oFmuABeZxKaztifrDTn19yKo';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// ── MODULES BY ROLE ──────────────────────────────────────────
const modules = {
  admin: [
    { icon:'📋', name:'Tablero Planning', desc:'Vista general de todos los proyectos', url:'fenomena-dashboard-brand.html' },
    { icon:'🎨', name:'Vista Diseño', desc:'Proyectos y entregas del equipo creativo', url:'fenomena-designer-view.html' },
    { icon:'📡', name:'Media Bridge', desc:'Pauta y notificaciones a Media', url:'fenomena-media-view.html' },
    { icon:'👥', name:'Influencers', desc:'Gestión de influencers por cliente', url:'fenomena-influencers.html' },
    { icon:'🔒', name:'Admin', desc:'Logs, horas y reportes', url:'fenomena-admin.html' },
  ],
  planning: [
    { icon:'📋', name:'Tablero', desc:'Proyectos del mes y to-dos', url:'fenomena-dashboard-brand.html' },
    { icon:'👥', name:'Influencers', desc:'Gestión de influencers', url:'fenomena-influencers.html' },
    { icon:'📡', name:'Media Bridge', desc:'Estado de pauta', url:'fenomena-media-view.html' },
  ],
  creative: [
    { icon:'🎨', name:'Mis proyectos', desc:'Tus cuentas y entregas', url:'fenomena-designer-view.html' },
  ],
  media: [
    { icon:'📡', name:'Pauta del mes', desc:'Contenido aprobado y papers', url:'fenomena-media-view.html' },
  ],
};

// ── SHOW/HIDE SCREENS ────────────────────────────────────────
function showLogin()     { document.getElementById('login-screen').style.display=''; document.getElementById('dashboard-screen').style.display='none'; }
function showDashboard() { document.getElementById('login-screen').style.display='none'; document.getElementById('dashboard-screen').style.display='block'; }

// ── LOAD PROFILE ─────────────────────────────────────────────
async function loadProfile(userId) {
  const { data, error } = await sb
    .from('profiles')
    .select('*')
    .eq('id', userId)
    .single();

  if (error || !data) {
    // Profile might not exist yet - show basic dashboard
    renderDashboard({ nombre: 'Usuario', rol: 'creative', email: '' });
    return;
  }
  renderDashboard(data);
}

function renderDashboard(profile) {
  const nombre = profile.nombre || profile.email?.split('@')[0] || 'Usuario';
  document.getElementById('dash-nombre').textContent  = nombre;
  document.getElementById('dash-nombre2').textContent = nombre.split(' ')[0];
  document.getElementById('dash-rol').textContent     = profile.rol?.toUpperCase() || 'USUARIO';
  document.getElementById('dash-avatar').textContent  = nombre[0]?.toUpperCase() || '?';

  // render module cards
  const mods = modules[profile.rol] || modules.creative;
  document.getElementById('role-cards').innerHTML = mods.map(m => `
    <div class="role-card" onclick="location.href='${m.url}'">
      <div class="rc-icon">${m.icon}</div>
      <div class="rc-name">${m.name}</div>
      <div class="rc-desc">${m.desc}</div>
    </div>
  `).join('');

  showDashboard();

  // log access
  logAccess(profile.id, 'login', 'dashboard', 'Sesión iniciada');
}

// ── LOG ACCESS ───────────────────────────────────────────────
async function logAccess(userId, accion, modulo, detalle) {
  if (!userId) return;
  await sb.from('access_logs').insert({
    user_id: userId,
    accion,
    modulo,
    detalle,
  });
}

// ── AUTH: PASSWORD LOGIN ─────────────────────────────────────
async function loginWithPassword() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn-login');

  if (!email || !password) { showError('Ingresa tu email y contraseña.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Entrando...';
  hideMessages();

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    showError(error.message === 'Invalid login credentials'
      ? 'Email o contraseña incorrectos.'
      : error.message);
    btn.disabled = false;
    btn.innerHTML = 'Entrar al workspace';
    return;
  }

  await loadProfile(data.user.id);
}

// ── AUTH: MAGIC LINK ─────────────────────────────────────────
async function loginMagicLink() {
  const email = document.getElementById('email').value.trim();
  const btn   = document.getElementById('btn-magic');

  if (!email) { showError('Ingresa tu email primero.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Enviando...';
  hideMessages();

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.href }
  });

  btn.disabled = false;
  btn.innerHTML = 'Enviar link mágico por email';

  if (error) { showError(error.message); return; }
  showSuccess('✓ Revisa tu email — te enviamos el link de acceso.');
}

// ── AUTH: LOGOUT ─────────────────────────────────────────────
async function logout() {
  await sb.auth.signOut();
  showLogin();
}

// ── CHECK SESSION ON LOAD ────────────────────────────────────
async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    await loadProfile(session.user.id);
  } else {
    showLogin();
  }
}

// auth state changes (magic link redirect)
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session?.user) {
    await loadProfile(session.user.id);
  } else if (event === 'SIGNED_OUT') {
    showLogin();
  }
});

// ── HELPERS ──────────────────────────────────────────────────
function showError(msg)   { const el = document.getElementById('msg-error'); el.textContent = msg; el.classList.add('show'); }
function showSuccess(msg) { const el = document.getElementById('msg-success'); el.textContent = msg; el.classList.add('show'); }
function hideMessages()   { document.getElementById('msg-error').classList.remove('show'); document.getElementById('msg-success').classList.remove('show'); }

function toggleForgot() {
  const email = document.getElementById('email').value.trim();
  if (!email) { showError('Ingresa tu email para resetear la contraseña.'); return; }
  sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
  showSuccess('✓ Te enviamos un email para resetear tu contraseña.');
}

// ── INIT ─────────────────────────────────────────────────────
checkSession();
</script>
